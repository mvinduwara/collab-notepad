server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/collabpad
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

app:
  jwt:
    secret: collabpad-super-secret-jwt-key-that-is-long-enough-for-hs256
    expiration: 86400000